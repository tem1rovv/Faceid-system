server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: faceid-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  jackson:
    serialization:
      fail-on-empty-beans: false
    deserialization:
      fail-on-unknown-properties: false

python:
  service:
    url: ${PYTHON_SERVICE_URL}
    connect-timeout: 10000
    read-timeout: 30000

recognition:
  similarity-threshold: ${RECOGNITION_SIMILARITY_THRESHOLD}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.faceid: DEBUG
    org.springframework.web: INFO
