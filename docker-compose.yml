version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: faceid-postgres
    environment:
      POSTGRES_DB: faceid
      POSTGRES_USER: ${SPRING_DATASOURCE_USERNAME}
      POSTGRES_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/main/resources/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U faceid -d faceid"]
      interval: 5s
      timeout: 5s
      retries: 10

  python-service:
    build:
      context: ./python-service
      dockerfile: Dockerfile
    container_name: faceid-python
    ports:
      - "8000:8000"
    environment:
      - MODEL_NAME=buffalo_sc
      - SIMILARITY_THRESHOLD=0.4
    volumes:
      - insightface_models:/root/.insightface
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 60s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: faceid-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      PYTHON_SERVICE_URL: ${PYTHON_SERVICE_URL}
      RECOGNITION_SIMILARITY_THRESHOLD: ${RECOGNITION_SIMILARITY_THRESHOLD}
    depends_on:
      postgres:
        condition: service_healthy
      python-service:
        condition: service_healthy

  # ── React Frontend (Nginx) ─────────────────────────────────────────────
  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile
    container_name: faceid-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  insightface_models:
